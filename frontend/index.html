<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>PDF 转 Word</title>
    <style>
        body { font-family: sans-serif; padding: 50px; line-height: 1.6; }
        .container { max-width: 500px; margin: auto; border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        .status { margin-top: 20px; padding: 10px; border-radius: 4px; display: none; }
        .success { background: #e8f5e9; color: #2e7d32; }
        .error { background: #ffebee; color: #c62828; }
        #progressBar { width: 100%; height: 10px; background: #eee; margin-top: 10px; display: none; }
        #progressInner { width: 0%; height: 100%; background: #4caf50; transition: width 0.3s; }
        #progressText { margin-top: 8px; color: #666; display: none; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h2>PDF 转 Word</h2>
        <p>选择电脑中的 PDF 文件进行转换：</p>

        <input type="file" id="pdfFile" accept=".pdf">
        <button id="convertBtn" onclick="startConversion()" style="margin-top: 10px; cursor: pointer;">开始转换</button>

        <div id="progressBar"><div id="progressInner"></div></div>
        <div id="progressText"></div>
        <div id="statusBox" class="status"></div>
    </div>

    <script>
        async function startConversion() {
            const fileInput = document.getElementById('pdfFile');
            const convertBtn = document.getElementById('convertBtn');
            const statusBox = document.getElementById('statusBox');
            const pBar = document.getElementById('progressBar');
            const pInner = document.getElementById('progressInner');
            const pText = document.getElementById('progressText');

            if (!fileInput.files[0]) {
                alert("请先选择一个 PDF 文件");
                return;
            }

            // 禁用按钮，防止重复提交
            convertBtn.disabled = true;
            fileInput.disabled = true;

            // 重置 UI
            statusBox.style.display = 'none';
            pBar.style.display = 'block';
            pText.style.display = 'block';
            pInner.style.width = '0%';
            pText.innerText = '准备转换...';

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                // 使用 fetch 发送请求，然后通过 SSE 接收进度
                const response = await fetch('http://127.0.0.1:5000/convert-stream', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('服务器响应错误');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // 解析 SSE 事件
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || ''; // 保留未完成的行

                    let eventType = 'message';
                    for (const line of lines) {
                        if (line.startsWith('event: ')) {
                            eventType = line.substring(7).trim();
                        } else if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.substring(6));

                            if (eventType === 'progress') {
                                // 更新进度
                                pInner.style.width = data.percent + '%';
                                pText.innerText = data.message + ` (${data.percent}%)`;

                            } else if (eventType === 'complete') {
                                // 转换完成，开始下载
                                pInner.style.width = '100%';
                                pText.innerText = '转换完成！正在下载...';

                                // 触发下载
                                const downloadUrl = `http://127.0.0.1:5000/download/${data.download_id}`;
                                const a = document.createElement('a');
                                a.href = downloadUrl;
                                a.download = data.filename;
                                document.body.appendChild(a);
                                a.click();
                                document.body.removeChild(a);

                                statusBox.className = 'status success';
                                statusBox.innerHTML = `<strong>转换完成！</strong><br>文件已开始下载，请选择保存位置`;
                                statusBox.style.display = 'block';

                            } else if (eventType === 'error') {
                                throw new Error(data.error || '转换失败');
                            }
                        }
                    }
                }

            } catch (err) {
                statusBox.className = 'status error';
                statusBox.innerText = "错误: " + err.message;
                statusBox.style.display = 'block';
                pInner.style.width = '0%';
                pText.style.display = 'none';
            } finally {
                // 恢复按钮状态
                convertBtn.disabled = false;
                fileInput.disabled = false;
            }
        }
    </script>
</body>
</html>
